<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Ethereal Lens</title>
    <meta name="description" content="A curated exploration of light, shadow, and the silent narratives found within the natural and built world.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>

<body>
    <nav id="navbar">
        <div class="logo">Kiwi shoots</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="#">About</a>
            <a href="#">Contact/Prints</a>
        </div>
        <div class="nav-icons">
            <svg id="bag-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
        </div>
    </nav>

    <main class="gallery-page-container">
        <header class="gallery-header">
            <h1 class="gallery-title">Kiwi Shoots</h1>
            <p class="gallery-subtitle">Just a dichromatic color deficient person taking photos.</p>
        </header>

        <div class="gallery-controls">
            <div class="control-group sort-group">
                <span class="control-label">SORT BY</span>
                <div class="control-dropdowns">
                    <button class="dropdown-btn" id="sort-btn">Series <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
                </div>
            </div>
            
            <div class="control-group view-group">
                <span class="control-label">VIEW</span>
                <div class="view-toggles">
                    <button class="view-btn active" title="Justified Grid">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                    </button>
                    <button class="view-btn" title="List">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <section id="gallery-grid" class="justified-grid">
            <!-- Images will be dynamically injected here via gallery.js -->
        </section>

        <div id="scroll-sentinel" style="height: 100px; margin-top: 2rem;"></div>
    </main>

    <footer class="gallery-footer">
        <div class="footer-left">
            &copy; 2024 Ethereal Lens Photography
        </div>
        <div class="footer-right">
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
            <a href="#">Behance</a>
        </div>
    </footer>

    <script src="gallery.js"></script>
</body>

</html>
